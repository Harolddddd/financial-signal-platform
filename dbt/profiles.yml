financial_platform:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('POSTGRES_USER', 'platform') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'platform') }}"
      port: 5432
      dbname: "{{ env_var('POSTGRES_DB', 'financial') }}"
      schema: public
      threads: 4
